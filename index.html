<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Workout Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d0d0d;
      color: #e4e4e7;
      min-height: 100vh;
      padding: 0 0 60px;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- Top bar ---- */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px 12px;
      max-width: 500px;
      margin: 0 auto;
    }

    .top-bar-brand {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #fafafa;
    }

    .top-bar-link {
      font-size: 0.78rem;
      font-weight: 600;
      color: #d4a053;
      cursor: pointer;
      padding: 6px 14px;
      border: 1px solid rgba(212, 160, 83, 0.25);
      border-radius: 20px;
      background: rgba(212, 160, 83, 0.08);
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .top-bar-link:active { background: rgba(212, 160, 83, 0.18); }

    /* ---- Shared ---- */
    .screen-container {
      max-width: 500px;
      margin: 0 auto;
      padding: 0 16px;
    }

    .screen-title {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #fafafa;
      margin-bottom: 4px;
    }

    .screen-subtitle {
      font-size: 0.88rem;
      color: #71717a;
      margin-bottom: 24px;
      font-weight: 400;
      line-height: 1.4;
    }

    /* ---- Area selection screen ---- */
    #area-select { padding: 0 16px; max-width: 500px; margin: 0 auto; }

    .area-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .area-btn {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 24px 12px 20px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      border: 1.5px solid #1f1f23;
      border-radius: 20px;
      cursor: pointer;
      text-align: center;
      transition: transform 0.12s, border-color 0.25s, background 0.25s;
      color: #a1a1aa;
      background: #141416;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
    }

    .area-btn .area-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .area-btn .area-icon svg {
      width: 32px;
      height: 32px;
      opacity: 0.55;
      transition: opacity 0.25s;
    }

    .area-btn:active { transform: scale(0.97); }

    .area-btn.selected {
      border-color: #d4a053;
      background: linear-gradient(165deg, #1c1a14 0%, #141416 100%);
      color: #e4e0d6;
    }

    .area-btn.selected .area-icon svg {
      opacity: 0.9;
    }

    .area-btn.selected::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #d4a053, transparent);
    }

    .area-btn.selected::after {
      content: "";
      position: absolute;
      top: 10px;
      right: 10px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #d4a053;
    }

    .area-btn .check-svg {
      position: absolute;
      top: 13px;
      right: 13px;
      width: 12px;
      height: 12px;
      opacity: 0;
      z-index: 1;
      transition: opacity 0.2s;
    }

    .area-btn.selected .check-svg { opacity: 1; }

    .area-grid > .area-btn:last-child:nth-child(odd) {
      grid-column: 1 / -1;
    }

    #start-workout-btn {
      display: none;
      width: 100%;
      padding: 16px;
      font-size: 0.92rem;
      font-weight: 700;
      background: linear-gradient(135deg, #d4a053, #c4842d);
      color: #0d0d0d;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: transform 0.12s;
      letter-spacing: 0.01em;
      -webkit-tap-highlight-color: transparent;
    }

    #start-workout-btn:active { transform: scale(0.98); }
    #start-workout-btn.visible { display: block; }

    .selection-hint {
      text-align: center;
      color: #3f3f46;
      font-size: 0.78rem;
      margin-top: 14px;
      font-weight: 500;
    }

    /* ---- Workout screen ---- */
    #workout-screen {
      display: none;
    }

    .workout-hero {
      background: linear-gradient(170deg, #1a1712 0%, #0d0d0d 60%);
      padding: 16px 20px 20px;
      margin-bottom: 8px;
    }

    .workout-hero-inner {
      max-width: 500px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #workout-title {
      font-size: 1.15rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #d4a053;
      margin: 0;
    }

    #back-btn {
      background: rgba(255,255,255,0.06);
      color: #a1a1aa;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 8px 16px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    #back-btn:active { background: rgba(255,255,255,0.1); }

    #exercise-list-wrap {
      max-width: 500px;
      margin: 0 auto;
      padding: 0 16px;
    }

    .exercise-card {
      background: #141416;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 10px;
      border: 1px solid #1f1f23;
      transition: border-color 0.3s;
      position: relative;
    }

    .exercise-card::before {
      content: "";
      position: absolute;
      top: 18px;
      left: 18px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #27272a;
      transition: background 0.3s;
    }

    .exercise-name {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 14px;
      color: #e4e4e7;
      padding-left: 18px;
    }

    .exercise-card.done {
      border-color: rgba(74, 222, 128, 0.2);
    }

    .exercise-card.done::before {
      background: #4ade80;
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.4);
    }

    .previous-weight {
      font-size: 0.72rem;
      color: #71717a;
      margin-bottom: 12px;
      padding: 6px 10px;
      background: rgba(212, 160, 83, 0.06);
      border: 1px solid rgba(212, 160, 83, 0.1);
      border-radius: 10px;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .sets-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .set-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }

    .set-label {
      font-size: 0.72rem;
      color: #52525b;
      width: 38px;
      flex-shrink: 0;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .set-row input {
      width: 68px;
      padding: 10px 6px;
      border-radius: 12px;
      border: 1px solid #27272a;
      background: #0d0d0d;
      color: #e4e4e7;
      font-size: 0.9rem;
      font-weight: 600;
      text-align: center;
      transition: border-color 0.2s, box-shadow 0.2s;
      -moz-appearance: textfield;
      font-family: inherit;
    }

    .set-row input::-webkit-outer-spin-button,
    .set-row input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .set-row input:focus {
      outline: none;
      border-color: #d4a053;
      box-shadow: 0 0 0 3px rgba(212, 160, 83, 0.1);
    }

    .set-row input::placeholder { color: #2c2c30; }

    .input-label {
      font-size: 0.68rem;
      color: #3f3f46;
      width: 24px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    #finish-btn {
      display: block;
      width: 100%;
      max-width: 500px;
      margin: 20px auto 0;
      padding: 16px;
      font-size: 0.92rem;
      font-weight: 700;
      background: linear-gradient(135deg, #4ade80, #22c55e);
      color: #052e16;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: transform 0.12s;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    #finish-btn-wrap { padding: 0 16px; }
    #finish-btn:active { transform: scale(0.98); }

    /* ---- Summary screen ---- */
    #summary-screen {
      display: none;
    }

    .summary-hero {
      text-align: center;
      padding: 32px 20px 24px;
      background: linear-gradient(170deg, #0f1a12 0%, #0d0d0d 60%);
    }

    .summary-hero .screen-title {
      color: #4ade80;
      margin-bottom: 6px;
    }

    .summary-hero .screen-subtitle {
      margin-bottom: 0;
    }

    #summary-list {
      text-align: left;
      padding: 8px 16px 0;
      max-width: 500px;
      margin: 0 auto;
    }

    .summary-exercise {
      background: #141416;
      border: 1px solid #1f1f23;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 8px;
    }

    .summary-exercise h3 {
      font-size: 0.88rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #d4a053;
    }

    .summary-exercise p {
      font-size: 0.78rem;
      color: #52525b;
      margin: 3px 0;
      font-weight: 500;
    }

    .summary-exercise p span {
      color: #a1a1aa;
      font-weight: 600;
    }

    #new-workout-btn {
      display: block;
      width: 100%;
      max-width: 468px;
      margin: 16px auto 0;
      padding: 16px;
      font-size: 0.92rem;
      font-weight: 700;
      background: linear-gradient(135deg, #d4a053, #c4842d);
      color: #0d0d0d;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: transform 0.12s;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    #new-workout-wrap { padding: 0 16px; }
    #new-workout-btn:active { transform: scale(0.98); }

    /* ---- History screen ---- */
    #history-screen { display: none; }

    .history-hero {
      padding: 16px 20px 20px;
      background: linear-gradient(170deg, #15131a 0%, #0d0d0d 60%);
    }

    .history-hero-inner {
      max-width: 500px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-hero h2 {
      font-size: 1.15rem;
      font-weight: 800;
      color: #fafafa;
      margin: 0;
    }

    #history-back-btn {
      background: rgba(255,255,255,0.06);
      color: #a1a1aa;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 8px 16px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    #history-list-wrap {
      max-width: 500px;
      margin: 0 auto;
      padding: 8px 16px 0;
    }

    .history-entry {
      background: #141416;
      border: 1px solid #1f1f23;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .history-entry:active { background: #1a1a1e; }

    .history-date {
      font-size: 0.72rem;
      color: #52525b;
      margin-bottom: 4px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .history-areas {
      font-size: 0.92rem;
      font-weight: 700;
      color: #d4a053;
      margin-bottom: 2px;
    }

    .history-detail {
      font-size: 0.76rem;
      color: #3f3f46;
      font-weight: 500;
    }

    .history-empty {
      text-align: center;
      color: #3f3f46;
      padding: 48px 20px;
      font-size: 0.88rem;
      font-weight: 500;
    }

    .history-expanded {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #1f1f23;
    }

    .history-expanded .summary-exercise {
      background: #0d0d0d;
      border-color: #1a1a1e;
      margin-bottom: 6px;
      padding: 10px 12px;
    }

    #clear-history-wrap {
      max-width: 500px;
      margin: 0 auto;
      padding: 8px 16px;
    }

    #clear-history-btn {
      display: block;
      width: 100%;
      padding: 12px;
      font-size: 0.8rem;
      font-weight: 600;
      background: transparent;
      color: #71717a;
      border: 1px solid #1f1f23;
      border-radius: 14px;
      cursor: pointer;
      transition: color 0.2s;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    #clear-history-btn:active { color: #ef4444; }
  </style>
</head>
<body>

  <!-- Screen 1: Pick body areas (multi-select) -->
  <div id="area-select">
    <div class="top-bar">
      <div class="top-bar-brand">Workout</div>
      <div class="top-bar-link" id="history-link">History</div>
    </div>
    <div style="padding: 0 16px;">
      <h1 class="screen-title">What are we hitting?</h1>
      <p class="screen-subtitle">Select one or more muscle groups</p>
      <div class="area-grid" id="area-grid"></div>
      <button id="start-workout-btn">Start Workout</button>
      <p class="selection-hint" id="selection-hint">Tap to select</p>
    </div>
  </div>

  <!-- Screen 2: Today's workout -->
  <div id="workout-screen">
    <div class="workout-hero">
      <div class="workout-hero-inner">
        <h2 id="workout-title"></h2>
        <button id="back-btn">Back</button>
      </div>
    </div>
    <div id="exercise-list-wrap">
      <div id="exercise-list"></div>
    </div>
    <div id="finish-btn-wrap">
      <button id="finish-btn">Finish Workout</button>
    </div>
  </div>

  <!-- Screen 3: Summary -->
  <div id="summary-screen">
    <div class="summary-hero">
      <h2 class="screen-title">Workout Complete</h2>
      <p class="screen-subtitle">Here's what you logged today.</p>
    </div>
    <div id="summary-list"></div>
    <div id="new-workout-wrap">
      <button id="new-workout-btn">Start New Workout</button>
    </div>
  </div>

  <!-- Screen 4: History -->
  <div id="history-screen">
    <div class="history-hero">
      <div class="history-hero-inner">
        <h2>History</h2>
        <button id="history-back-btn">Back</button>
      </div>
    </div>
    <div id="history-list-wrap">
      <div id="history-list"></div>
    </div>
    <div id="clear-history-wrap">
      <button id="clear-history-btn">Clear All History</button>
    </div>
  </div>

  <!-- SVG icon definitions (hidden) -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none;">
    <symbol id="icon-chest" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

  <script>
    // ===== Exercise database =====
    const WORKOUTS = {
      chest: [
        ["Flat Barbell Bench Press", "Incline Dumbbell Press", "Cable Flyes", "Push-Ups"],
        ["Incline Barbell Bench Press", "Flat Dumbbell Press", "Pec Deck Machine", "Dips"],
        ["Dumbbell Bench Press", "Incline Smith Machine Press", "Low Cable Crossover", "Decline Push-Ups"],
      ],
      back: [
        ["Barbell Rows", "Lat Pulldowns", "Seated Cable Rows", "Face Pulls"],
        ["Pull-Ups", "Dumbbell Rows", "T-Bar Row", "Straight Arm Pulldowns"],
        ["Deadlifts", "Wide Grip Lat Pulldown", "Cable Rows", "Reverse Flyes"],
      ],
      legs: [
        ["Barbell Squats", "Romanian Deadlifts", "Leg Press", "Calf Raises"],
        ["Front Squats", "Leg Curls", "Walking Lunges", "Leg Extensions"],
        ["Goblet Squats", "Hip Thrusts", "Bulgarian Split Squats", "Seated Calf Raises"],
      ],
      arms: [
        ["Barbell Curls", "Tricep Dips", "Hammer Curls", "Overhead Tricep Extension"],
        ["Dumbbell Curls", "Close Grip Bench Press", "Preacher Curls", "Tricep Pushdowns"],
        ["EZ Bar Curls", "Skull Crushers", "Concentration Curls", "Cable Tricep Kickbacks"],
      ],
      shoulders: [
        ["Overhead Press", "Lateral Raises", "Front Raises", "Reverse Pec Deck"],
        ["Dumbbell Shoulder Press", "Cable Lateral Raises", "Arnold Press", "Face Pulls"],
        ["Military Press", "Upright Rows", "Dumbbell Lateral Raises", "Rear Delt Flyes"],
      ],
      abs: [
        ["Hanging Leg Raises", "Cable Crunches", "Ab Wheel Rollouts", "Plank Hold"],
        ["Bicycle Crunches", "Dragon Flags", "Decline Sit-Ups", "Dead Bugs"],
        ["Weighted Sit-Ups", "Pallof Press", "Toe Touches", "Mountain Climbers"],
      ],
    };

    const AREA_META = {
      chest:     { icon: "icon-chest",     label: "Chest" },
      back:      { icon: "icon-back",      label: "Back" },
      legs:      { icon: "icon-legs",      label: "Legs" },
      arms:      { icon: "icon-arms",      label: "Arms" },
      shoulders: { icon: "icon-shoulders", label: "Shoulders" },
      abs:       { icon: "icon-abs",       label: "Abs" },
    };

    const SETS_PER_EXERCISE = 3;
    const STORAGE_KEY = "gym_workout_history";

    // ===== State =====
    let selectedAreas = [];
    let currentExercises = [];

    // ===== DOM refs =====
    const areaSelect      = document.getElementById("area-select");
    const areaGrid        = document.getElementById("area-grid");
    const startBtn        = document.getElementById("start-workout-btn");
    const selectionHint   = document.getElementById("selection-hint");
    const workoutScreen   = document.getElementById("workout-screen");
    const summaryScreen   = document.getElementById("summary-screen");
    const historyScreen   = document.getElementById("history-screen");
    const workoutTitle    = document.getElementById("workout-title");
    const exerciseList    = document.getElementById("exercise-list");
    const summaryList     = document.getElementById("summary-list");
    const historyList     = document.getElementById("history-list");

    // ===== Build area buttons =====
    const checkSvg = '<svg class="check-svg" viewBox="0 0 24 24" fill="#0d0d0d" xmlns="http://www.w3.org/2000/svg"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';

    Object.keys(AREA_META).forEach(area => {
      const meta = AREA_META[area];
      const btn = document.createElement("button");
      btn.className = "area-btn";
      btn.dataset.area = area;
      btn.innerHTML = `
        <span class="area-icon"><svg><use href="#${meta.icon}"/></svg></span>
        ${meta.label}
        ${checkSvg}`;
      btn.addEventListener("click", () => toggleArea(area, btn));
      areaGrid.appendChild(btn);
    });

    // ===== Toggle area selection =====
    function toggleArea(area, btn) {
      const idx = selectedAreas.indexOf(area);
      if (idx > -1) {
        selectedAreas.splice(idx, 1);
        btn.classList.remove("selected");
      } else {
        selectedAreas.push(area);
        btn.classList.add("selected");
      }
      updateStartButton();
    }

    function updateStartButton() {
      if (selectedAreas.length > 0) {
        startBtn.classList.add("visible");
        const labels = selectedAreas.map(a => AREA_META[a].label);
        startBtn.textContent = labels.join(" + ");
        selectionHint.textContent = selectedAreas.length + " selected";
      } else {
        startBtn.classList.remove("visible");
        selectionHint.textContent = "Tap to select";
      }
    }

    // ===== Persistence helpers =====
    function loadHistory() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch { return []; }
    }

    function saveWorkout(record) {
      const history = loadHistory();
      history.unshift(record);
      if (history.length > 50) history.length = 50;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    }

    function getLastWeight(exerciseName) {
      const history = loadHistory();
      for (const workout of history) {
        if (!workout.exercises) continue;
        for (const ex of workout.exercises) {
          if (ex.name === exerciseName) {
            for (const set of ex.sets) {
              if (set.weight && set.weight !== "-" && Number(set.weight) > 0) {
                return set.weight;
              }
            }
          }
        }
      }
      return null;
    }

    // ===== Generate workout =====
    function generateWorkout(areas) {
      const exercises = [];
      areas.forEach(area => {
        const options = WORKOUTS[area];
        const pick = options[Math.floor(Math.random() * options.length)];
        pick.forEach(name => exercises.push({ name, area }));
      });
      return exercises;
    }

    // ===== Render workout =====
    function showWorkout() {
      if (selectedAreas.length === 0) return;

      currentExercises = generateWorkout(selectedAreas);
      const titleLabels = selectedAreas.map(a => AREA_META[a].label);
      workoutTitle.textContent = titleLabels.join(" + ") + " Day";
      exerciseList.innerHTML = "";

      currentExercises.forEach((ex, i) => {
        const card = document.createElement("div");
        card.className = "exercise-card";
        card.dataset.index = i;

        const lastWeight = getLastWeight(ex.name);
        let prevHtml = "";
        if (lastWeight) {
          prevHtml = `<div class="previous-weight">Last session: ${lastWeight} lbs</div>`;
        }

        let setsHTML = "";
        for (let s = 1; s <= SETS_PER_EXERCISE; s++) {
          const prefill = lastWeight || "";
          setsHTML += `
            <div class="set-row">
              <span class="set-label">S${s}</span>
              <input type="number" inputmode="decimal" placeholder="${prefill || '-'}" value="${prefill}" data-exercise="${i}" data-set="${s}" data-field="weight">
              <span class="input-label">lbs</span>
              <input type="number" inputmode="numeric" placeholder="-" data-exercise="${i}" data-set="${s}" data-field="reps">
              <span class="input-label">reps</span>
            </div>`;
        }

        card.innerHTML = `
          <div class="exercise-name">${ex.name}</div>
          ${prevHtml}
          <div class="sets-container">${setsHTML}</div>`;

        exerciseList.appendChild(card);
      });

      exerciseList.querySelectorAll("input").forEach(input => {
        input.addEventListener("input", () => {
          const card = input.closest(".exercise-card");
          const inputs = card.querySelectorAll("input");
          const anyFilled = Array.from(inputs).some(inp => inp.value !== "");
          card.classList.toggle("done", anyFilled);
        });
      });

      areaSelect.style.display = "none";
      summaryScreen.style.display = "none";
      historyScreen.style.display = "none";
      workoutScreen.style.display = "block";
    }

    // ===== Finish workout =====
    function finishWorkout() {
      summaryList.innerHTML = "";

      const record = {
        date: new Date().toISOString(),
        areas: selectedAreas.map(a => AREA_META[a].label),
        exercises: [],
      };

      currentExercises.forEach((ex, i) => {
        const div = document.createElement("div");
        div.className = "summary-exercise";

        const exRecord = { name: ex.name, area: ex.area, sets: [] };
        let setsText = "";
        for (let s = 1; s <= SETS_PER_EXERCISE; s++) {
          const w = exerciseList.querySelector(`input[data-exercise="${i}"][data-set="${s}"][data-field="weight"]`).value || "-";
          const r = exerciseList.querySelector(`input[data-exercise="${i}"][data-set="${s}"][data-field="reps"]`).value || "-";
          setsText += `<p>Set ${s}: <span>${w} lbs x ${r}</span></p>`;
          exRecord.sets.push({ weight: w, reps: r });
        }

        div.innerHTML = `<h3>${ex.name}</h3>${setsText}`;
        summaryList.appendChild(div);
        record.exercises.push(exRecord);
      });

      saveWorkout(record);

      workoutScreen.style.display = "none";
      summaryScreen.style.display = "block";
    }

    // ===== History =====
    function showHistory() {
      const history = loadHistory();
      historyList.innerHTML = "";

      if (history.length === 0) {
        historyList.innerHTML = '<div class="history-empty">No workouts logged yet.</div>';
      } else {
        history.forEach(entry => {
          const div = document.createElement("div");
          div.className = "history-entry";

          const d = new Date(entry.date);
          const dateStr = d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
          const timeStr = d.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
          const exCount = entry.exercises ? entry.exercises.length : 0;

          div.innerHTML = `
            <div class="history-date">${dateStr} &middot; ${timeStr}</div>
            <div class="history-areas">${entry.areas.join(" + ")}</div>
            <div class="history-detail">${exCount} exercises</div>`;

          div.addEventListener("click", () => {
            const existing = div.querySelector(".history-expanded");
            if (existing) { existing.remove(); return; }
            if (entry.exercises) {
              const details = document.createElement("div");
              details.className = "history-expanded";
              entry.exercises.forEach(ex => {
                const exDiv = document.createElement("div");
                exDiv.className = "summary-exercise";
                let setsHtml = "";
                ex.sets.forEach((set, si) => {
                  setsHtml += `<p>Set ${si + 1}: <span>${set.weight} lbs x ${set.reps}</span></p>`;
                });
                exDiv.innerHTML = `<h3>${ex.name}</h3>${setsHtml}`;
                details.appendChild(exDiv);
              });
              div.appendChild(details);
            }
          });

          historyList.appendChild(div);
        });
      }

      areaSelect.style.display = "none";
      historyScreen.style.display = "block";
    }

    // ===== Reset =====
    function resetSelection() {
      selectedAreas = [];
      document.querySelectorAll(".area-btn").forEach(b => b.classList.remove("selected"));
      updateStartButton();
    }

    // ===== Events =====
    startBtn.addEventListener("click", showWorkout);

    document.getElementById("back-btn").addEventListener("click", () => {
      workoutScreen.style.display = "none";
      areaSelect.style.display = "block";
    });

    document.getElementById("finish-btn").addEventListener("click", finishWorkout);

    document.getElementById("new-workout-btn").addEventListener("click", () => {
      summaryScreen.style.display = "none";
      areaSelect.style.display = "block";
      resetSelection();
    });

    document.getElementById("history-link").addEventListener("click", showHistory);

    document.getElementById("history-back-btn").addEventListener("click", () => {
      historyScreen.style.display = "none";
      areaSelect.style.display = "block";
    });

    document.getElementById("clear-history-btn").addEventListener("click", () => {
      if (confirm("Clear all workout history?")) {
        localStorage.removeItem(STORAGE_KEY);
        showHistory();
      }
    });
  </script>
</body>
</html>
